# Fact categories for the FACTS tab (evidence dossier).
# Each category groups researched, citation-backed findings about the account.
# order  = render order in the UI (lower first).
# citation_required = if true, a finding in this category must carry a source URL.
version: 1.0

categories:
  priorities_and_triggers:
    display: Priorities & triggers
    description: >
      Recent moves, initiatives, leadership changes, funding, expansion or
      cutbacks that make this conversation timely.
    order: 1
    citation_required: true

  pain_signals:
    display: Pain signals
    description: >
      Public evidence of bottlenecks, complaints, compliance pressure, or
      operational issues the rep's product could address.
    order: 2
    citation_required: true

  stakeholders:
    display: Stakeholders
    description: >
      Who matters in the buying group — the contact's mandate, influencers,
      likely economic buyer, and potential blockers.
    order: 3
    citation_required: true

  incumbent_gaps:
    display: Incumbent gaps
    description: >
      Weaknesses, complaints, switching friction, or reliability issues with the
      current vendor or status quo.
    order: 4
    citation_required: true

  proof_points:
    display: Proof points
    description: >
      Outcomes, comparisons, or facts that make change feel safe and valuable.
    order: 5
    citation_required: true

  legal_regulatory:
    display: Legal & regulatory
    description: >
      Lawsuits, settlements, or regulatory matters that are responsibly
      conversation-relevant (reliability, procurement caution, continuity).
    order: 6
    citation_required: true

  open_questions:
    display: Open questions
    description: >
      Key unknowns research could not confirm — to verify live in the meeting.
    order: 7
    citation_required: false
